<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Capability matrix comparing AgenticMemory, AgenticVision, and AgenticCodebase in the ecosystem">
  <defs>
    <style>
      .bg { fill: #f2f1ea; }
      .fg { fill: #0a0a0a; }
      .line { stroke: #0a0a0a; stroke-linecap: square; stroke-linejoin: miter; }
      .grid { stroke: #c4c2b8; stroke-width: 1; }
      .h1 { font-family: 'JetBrains Mono', monospace; font-size: 24px; letter-spacing: 0.12em; text-transform: uppercase; fill: #0a0a0a; }
      .h2 { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; fill: #5f5a4f; }
      .cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; fill: #0a0a0a; }
      .head { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; fill: #f2f1ea; }
    </style>
  </defs>

  <rect width="1200" height="630" class="bg"/>

  <g>
    <line x1="0" y1="0" x2="1200" y2="0" class="grid"/>
    <line x1="0" y1="24" x2="1200" y2="24" class="grid"/>
    <line x1="0" y1="48" x2="1200" y2="48" class="grid"/>
    <line x1="0" y1="72" x2="1200" y2="72" class="grid"/>
    <line x1="0" y1="96" x2="1200" y2="96" class="grid"/>
    <line x1="0" y1="120" x2="1200" y2="120" class="grid"/>
    <line x1="0" y1="144" x2="1200" y2="144" class="grid"/>
    <line x1="0" y1="168" x2="1200" y2="168" class="grid"/>
    <line x1="0" y1="192" x2="1200" y2="192" class="grid"/>
    <line x1="0" y1="216" x2="1200" y2="216" class="grid"/>
    <line x1="0" y1="240" x2="1200" y2="240" class="grid"/>
    <line x1="0" y1="264" x2="1200" y2="264" class="grid"/>
    <line x1="0" y1="288" x2="1200" y2="288" class="grid"/>
    <line x1="0" y1="312" x2="1200" y2="312" class="grid"/>
    <line x1="0" y1="336" x2="1200" y2="336" class="grid"/>
    <line x1="0" y1="360" x2="1200" y2="360" class="grid"/>
    <line x1="0" y1="384" x2="1200" y2="384" class="grid"/>
    <line x1="0" y1="408" x2="1200" y2="408" class="grid"/>
    <line x1="0" y1="432" x2="1200" y2="432" class="grid"/>
    <line x1="0" y1="456" x2="1200" y2="456" class="grid"/>
    <line x1="0" y1="480" x2="1200" y2="480" class="grid"/>
    <line x1="0" y1="504" x2="1200" y2="504" class="grid"/>
    <line x1="0" y1="528" x2="1200" y2="528" class="grid"/>
    <line x1="0" y1="552" x2="1200" y2="552" class="grid"/>
    <line x1="0" y1="576" x2="1200" y2="576" class="grid"/>
    <line x1="0" y1="600" x2="1200" y2="600" class="grid"/>
  </g>

  <rect x="24" y="24" width="1152" height="582" fill="none" class="line" stroke-width="2"/>

  <text x="48" y="62" class="h1">AGENTIC ECOSYSTEM CAPABILITY MATRIX</text>
  <text x="48" y="86" class="h2">compare role, artifact, surface area, and operational focus</text>

  <g>
    <rect x="60" y="130" width="1080" height="54" class="fg"/>
    <text x="84" y="163" class="head">CAPABILITY</text>
    <text x="398" y="163" class="head">AGENTIC-MEMORY</text>
    <text x="670" y="163" class="head">AGENTIC-VISION</text>
    <text x="936" y="163" class="head">AGENTIC-CODEBASE</text>

    <rect x="60" y="184" width="1080" height="330" fill="none" class="line" stroke-width="2"/>
    <line x1="340" y1="184" x2="340" y2="514" class="line" stroke-width="2"/>
    <line x1="620" y1="184" x2="620" y2="514" class="line" stroke-width="2"/>
    <line x1="890" y1="184" x2="890" y2="514" class="line" stroke-width="2"/>

    <line x1="60" y1="239" x2="1140" y2="239" class="line" stroke-width="2"/>
    <line x1="60" y1="294" x2="1140" y2="294" class="line" stroke-width="2"/>
    <line x1="60" y1="349" x2="1140" y2="349" class="line" stroke-width="2"/>
    <line x1="60" y1="404" x2="1140" y2="404" class="line" stroke-width="2"/>
    <line x1="60" y1="459" x2="1140" y2="459" class="line" stroke-width="2"/>

    <text x="84" y="218" class="cell">PRIMARY ROLE</text>
    <text x="358" y="218" class="cell">COGNITIVE GRAPH MEMORY</text>
    <text x="638" y="218" class="cell">VISUAL HISTORY + SIMILARITY</text>
    <text x="908" y="218" class="cell">SEMANTIC CODE INTELLIGENCE</text>

    <text x="84" y="273" class="cell">PORTABLE ARTIFACT</text>
    <text x="358" y="273" class="cell">.AMEM</text>
    <text x="638" y="273" class="cell">.AVIS</text>
    <text x="908" y="273" class="cell">.ACB</text>

    <text x="84" y="328" class="cell">QUERY / TOOL SURFACE</text>
    <text x="358" y="328" class="cell">16 QUERY TYPES</text>
    <text x="638" y="328" class="cell">10 MCP TOOLS</text>
    <text x="908" y="328" class="cell">24 QUERY TYPES</text>

    <text x="84" y="383" class="cell">CORE STRENGTH</text>
    <text x="358" y="383" class="cell">REASONING CONTINUITY</text>
    <text x="638" y="383" class="cell">VISUAL CONTINUITY</text>
    <text x="908" y="383" class="cell">CHANGE IMPACT ANALYSIS</text>

    <text x="84" y="438" class="cell">INTEGRATION MODE</text>
    <text x="358" y="438" class="cell">MCP + PYTHON + RUST</text>
    <text x="638" y="438" class="cell">MCP + RUST</text>
    <text x="908" y="438" class="cell">MCP + CLI + RUST</text>

    <text x="84" y="493" class="cell">BEST USED FOR</text>
    <text x="358" y="493" class="cell">DECISIONS, DRIFT, GAPS</text>
    <text x="638" y="493" class="cell">CAPTURE, DIFF, TRACKING</text>
    <text x="908" y="493" class="cell">SYMBOLS, CALLS, PROPHECY</text>
  </g>

  <g>
    <rect x="60" y="536" width="1080" height="44" fill="none" class="line" stroke-width="2"/>
    <text x="84" y="564" class="h2">unified via mcp: one agent can remember, see, and understand code across sessions</text>
    <rect x="1098" y="548" width="18" height="18" fill="#ea580c"/>
  </g>
</svg>
