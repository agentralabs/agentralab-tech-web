<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1400" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#1e293b"/>
    </marker>
    <style>
      .title{font:700 34px 'Manrope',Arial,sans-serif;fill:#0f172a}
      .label{font:600 20px 'Manrope',Arial,sans-serif;fill:#0f172a}
      .meta{font:500 15px 'Manrope',Arial,sans-serif;fill:#334155}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
      .line{stroke:#1e293b;stroke-width:3;marker-end:url(#arrow2)}
      .chip{fill:#dbeafe;stroke:#93c5fd;stroke-width:1.5}
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="620" fill="url(#bg2)"/>
  <text x="60" y="70" class="title">Local Runtime Flow (Desktop/Terminal)</text>

  <rect x="80" y="140" width="230" height="96" rx="14" class="box"/>
  <text x="110" y="180" class="label">1. Install Sister</text>
  <text x="110" y="208" class="meta">curl .../install/{target}</text>

  <rect x="370" y="140" width="250" height="96" rx="14" class="box"/>
  <text x="400" y="180" class="label">2. Restart MCP Client</text>
  <text x="400" y="208" class="meta">reload registry/config</text>

  <rect x="680" y="140" width="240" height="96" rx="14" class="box"/>
  <text x="710" y="180" class="label">3. Agentra Detects</text>
  <text x="710" y="208" class="meta">status + doctor checks</text>

  <rect x="980" y="140" width="300" height="96" rx="14" class="box"/>
  <text x="1010" y="180" class="label">4. Takeover Decision</text>
  <text x="1010" y="208" class="meta">sister on + artifacts present</text>

  <line x1="310" y1="188" x2="370" y2="188" class="line"/>
  <line x1="620" y1="188" x2="680" y2="188" class="line"/>
  <line x1="920" y1="188" x2="980" y2="188" class="line"/>

  <rect x="140" y="320" width="1120" height="210" rx="16" class="box"/>
  <text x="180" y="364" class="label">Runtime Output Surface</text>

  <rect x="190" y="390" width="260" height="58" rx="12" class="chip"/>
  <text x="210" y="425" class="meta">Codebase: graph + impact</text>
  <rect x="500" y="390" width="260" height="58" rx="12" class="chip"/>
  <text x="520" y="425" class="meta">Memory: continuity + facts</text>
  <rect x="810" y="390" width="260" height="58" rx="12" class="chip"/>
  <text x="830" y="425" class="meta">Vision: perceptive context</text>

  <text x="190" y="486" class="meta">Session line (example):</text>
  <text x="190" y="514" class="meta">Agentra: Active | Sisters: Codebase/Memory/Vision ON | Full Control: Yes | Model + tokens shown</text>
</svg>
