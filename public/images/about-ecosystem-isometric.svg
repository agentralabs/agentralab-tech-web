<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048" role="img" aria-label="Isometric agentic ecosystem infrastructure showing memory, vision, and codebase nodes linked by signal routes">
  <defs>
    <style>
      .bg { fill: #efe1c8; }
      .platform { fill: #ddd0b7; }
      .top { fill: #2a2d33; }
      .left { fill: #1e2126; }
      .right { fill: #15181d; }
      .line { stroke: #111316; stroke-linecap: square; stroke-linejoin: miter; }
      .wire { stroke: #ea580c; stroke-width: 12; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .wire-thin { stroke: #f4a460; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .detail { stroke: #3b3f46; stroke-width: 3; }
      .led { fill: #ea580c; }
      .panel { fill: #1a1d22; stroke: #2a2e35; stroke-width: 3; }
      .panel-text { font-family: 'JetBrains Mono', monospace; font-size: 30px; letter-spacing: 0.1em; text-transform: uppercase; fill: #b8b3a8; }
    </style>
  </defs>

  <rect width="2048" height="2048" class="bg"/>

  <polygon points="280,1490 1140,1010 1820,1370 960,1845" class="platform"/>

  <path class="wire" d="M470 1460 L470 1280 L670 1165"/>
  <path class="wire" d="M520 1480 L520 1310 L760 1180"/>
  <path class="wire" d="M640 1510 L640 1340 L890 1210"/>
  <path class="wire" d="M760 1540 L760 1375 L1040 1230"/>
  <path class="wire" d="M900 1620 L900 1470 L1220 1300"/>
  <path class="wire" d="M1020 1690 L1020 1540 L1375 1350"/>
  <path class="wire" d="M1120 1720 L1120 1580 L1500 1380"/>

  <path class="wire-thin" d="M470 1460 L470 1280 L670 1165"/>
  <path class="wire-thin" d="M520 1480 L520 1310 L760 1180"/>
  <path class="wire-thin" d="M640 1510 L640 1340 L890 1210"/>
  <path class="wire-thin" d="M760 1540 L760 1375 L1040 1230"/>
  <path class="wire-thin" d="M900 1620 L900 1470 L1220 1300"/>
  <path class="wire-thin" d="M1020 1690 L1020 1540 L1375 1350"/>
  <path class="wire-thin" d="M1120 1720 L1120 1580 L1500 1380"/>

  <!-- Block A -->
  <polygon points="560,980 760,865 940,960 740,1075" class="top"/>
  <polygon points="560,980 560,1340 740,1435 740,1075" class="left"/>
  <polygon points="740,1075 940,960 940,1320 740,1435" class="right"/>
  <polyline points="592,1000 712,930 872,1015" class="detail" fill="none"/>
  <line x1="620" y1="1110" x2="620" y2="1360" class="detail"/>
  <line x1="670" y1="1140" x2="670" y2="1390" class="detail"/>
  <line x1="820" y1="1050" x2="820" y2="1300" class="detail"/>
  <rect x="885" y="1080" width="18" height="18" class="led"/>
  <rect x="885" y="1120" width="10" height="10" class="led"/>

  <!-- Block B -->
  <polygon points="910,1090 1070,995 1220,1075 1060,1170" class="top"/>
  <polygon points="910,1090 910,1490 1060,1575 1060,1170" class="left"/>
  <polygon points="1060,1170 1220,1075 1220,1475 1060,1575" class="right"/>
  <line x1="950" y1="1200" x2="950" y2="1510" class="detail"/>
  <line x1="985" y1="1220" x2="985" y2="1530" class="detail"/>
  <line x1="1160" y1="1120" x2="1160" y2="1420" class="detail"/>
  <rect x="1178" y="1160" width="16" height="16" class="led"/>
  <rect x="1178" y="1210" width="9" height="9" class="led"/>

  <!-- Block C -->
  <polygon points="1150,890 1330,785 1490,870 1310,975" class="top"/>
  <polygon points="1150,890 1150,1230 1310,1315 1310,975" class="left"/>
  <polygon points="1310,975 1490,870 1490,1210 1310,1315" class="right"/>
  <line x1="1190" y1="1010" x2="1190" y2="1260" class="detail"/>
  <line x1="1230" y1="1035" x2="1230" y2="1285" class="detail"/>
  <rect x="1428" y="1010" width="20" height="20" class="led"/>

  <!-- Block D -->
  <polygon points="350,1260 510,1170 650,1245 490,1335" class="top"/>
  <polygon points="350,1260 350,1530 490,1610 490,1335" class="left"/>
  <polygon points="490,1335 650,1245 650,1515 490,1610" class="right"/>
  <line x1="392" y1="1360" x2="392" y2="1560" class="detail"/>
  <line x1="432" y1="1385" x2="432" y2="1585" class="detail"/>
  <rect x="602" y="1330" width="12" height="12" class="led"/>

  <!-- Block E -->
  <polygon points="1180,1340 1360,1235 1520,1320 1340,1425" class="top"/>
  <polygon points="1180,1340 1180,1650 1340,1735 1340,1425" class="left"/>
  <polygon points="1340,1425 1520,1320 1520,1630 1340,1735" class="right"/>
  <line x1="1220" y1="1450" x2="1220" y2="1680" class="detail"/>
  <line x1="1260" y1="1475" x2="1260" y2="1705" class="detail"/>
  <rect x="1468" y="1450" width="12" height="12" class="led"/>

  <!-- Block F -->
  <polygon points="920,1490 1060,1410 1190,1480 1050,1560" class="top"/>
  <polygon points="920,1490 920,1760 1050,1830 1050,1560" class="left"/>
  <polygon points="1050,1560 1190,1480 1190,1750 1050,1830" class="right"/>
  <line x1="950" y1="1580" x2="950" y2="1780" class="detail"/>
  <line x1="985" y1="1600" x2="985" y2="1800" class="detail"/>

  <!-- Block G -->
  <polygon points="690,1500 810,1430 920,1490 800,1560" class="top"/>
  <polygon points="690,1500 690,1725 800,1785 800,1560" class="left"/>
  <polygon points="800,1560 920,1490 920,1715 800,1785" class="right"/>

  <!-- Small connector unit -->
  <polygon points="560,1450 640,1405 715,1446 635,1491" class="top"/>
  <polygon points="560,1450 560,1565 635,1608 635,1491" class="left"/>
  <polygon points="635,1491 715,1446 715,1562 635,1608" class="right"/>

  <!-- Floating telemetry panels -->
  <g>
    <polygon points="620,810 750,735 870,800 740,875" class="panel"/>
    <line x1="650" y1="792" x2="845" y2="792" stroke="#ea580c" stroke-width="8"/>
    <line x1="650" y1="824" x2="820" y2="824" stroke="#6f746f" stroke-width="6"/>
    <line x1="650" y1="852" x2="800" y2="852" stroke="#6f746f" stroke-width="6"/>
  </g>

  <g>
    <polygon points="410,930 495,880 575,923 490,973" class="panel"/>
    <line x1="430" y1="918" x2="560" y2="918" stroke="#ea580c" stroke-width="7"/>
    <line x1="430" y1="942" x2="540" y2="942" stroke="#6f746f" stroke-width="5"/>
  </g>

  <g>
    <polygon points="1520,1070 1640,1000 1755,1060 1635,1130" class="panel"/>
    <line x1="1545" y1="1053" x2="1725" y2="1053" stroke="#ea580c" stroke-width="8"/>
    <line x1="1545" y1="1082" x2="1705" y2="1082" stroke="#6f746f" stroke-width="6"/>
    <line x1="1545" y1="1108" x2="1688" y2="1108" stroke="#6f746f" stroke-width="6"/>
  </g>

  <text x="84" y="1980" class="panel-text">agentic ecosystem isometric mesh / memory + vision + code intelligence</text>
</svg>
