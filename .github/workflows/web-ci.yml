name: Web CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sister repos for cross-validation
        run: |
          MONOREPO="$RUNNER_TEMP/agentra-monorepo"
          git clone --depth 1 https://github.com/agentralabs/agentralabs-tech.git "$MONOREPO"

          REPO_LIST="$RUNNER_TEMP/agentra-sister-repos.txt"
          {
            jq -r '.sisters[].repo' "$MONOREPO/docs/sisters-registry.json"
            jq -r '.sisters[] | select(.enabled != false) | .repo' docs/ecosystem/navigation-contract.json
          } | awk 'NF' | sort -u > "$REPO_LIST"

          cd ..
          for repo in $(cat "$REPO_LIST"); do
            rm -rf "$repo"
            git clone --depth 1 "https://github.com/agentralabs/${repo}.git" "$repo"
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release docs readiness guardrail
        run: pnpm docs:release:check

      - name: Sister web parity guardrail
        run: pnpm parity:check

      - name: Build
        run: pnpm build
