name: Web CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout sister repos for cross-validation
        run: |
          cd ..
          git clone --depth 1 https://github.com/agentralabs/agentic-memory.git
          git clone --depth 1 https://github.com/agentralabs/agentic-vision.git
          git clone --depth 1 https://github.com/agentralabs/agentic-codebase.git
          git clone --depth 1 https://github.com/agentralabs/agentic-identity.git

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release docs readiness guardrail
        run: pnpm docs:release:check

      - name: Sister web parity guardrail
        run: pnpm parity:check

      - name: Build
        run: pnpm build
